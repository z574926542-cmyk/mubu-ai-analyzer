name: 手动触发发布 DMG (GUI版)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.1.0)'
        required: true
        default: '1.1.0'
      release_notes:
        description: '更新说明'
        required: false
        default: '新增图形界面，双击即可运行'

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: 生成应用图标
        run: |
          python3 - <<'EOF'
          from PIL import Image, ImageDraw
          import os, subprocess

          os.makedirs("AppIcon.iconset", exist_ok=True)
          sizes = [16, 32, 128, 256, 512, 1024]

          for size in sizes:
              img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              m = max(2, size // 8)
              # 渐变蓝紫色背景
              draw.rounded_rectangle([m, m, size-m, size-m], radius=size//5, fill=(100, 80, 240))
              # 绘制三条横线（代表文档/大纲）
              bar_h = max(2, size // 10)
              bar_w = size * 11 // 16
              cx = size // 2
              for y_ratio in [0.35, 0.52, 0.69]:
                  y = int(size * y_ratio)
                  draw.rectangle([cx - bar_w//2, y - bar_h//2, cx + bar_w//2, y + bar_h//2], fill='white')
              # 小圆点
              dot_r = max(2, size // 14)
              dot_x = cx - bar_w//2 - dot_r*2
              for y_ratio in [0.35, 0.52, 0.69]:
                  y = int(size * y_ratio)
                  draw.ellipse([dot_x - dot_r, y - dot_r, dot_x + dot_r, y + dot_r], fill=(180, 220, 255))

              img.save(f"AppIcon.iconset/icon_{size}x{size}.png")
              if size >= 32:
                  half = size // 2
                  img_half = img.resize((half, half), Image.LANCZOS)
                  img_half.save(f"AppIcon.iconset/icon_{half}x{half}@2x.png")

          subprocess.run(["iconutil", "-c", "icns", "AppIcon.iconset", "-o", "AppIcon.icns"], check=True)
          print("图标生成完成")
          EOF

      - name: 创建 PyInstaller spec (GUI版)
        run: |
          VERSION="${{ github.event.inputs.version }}"
          cat > mubu_gui.spec << SPEC
          # -*- mode: python ; coding: utf-8 -*-
          block_cipher = None
          a = Analysis(
              ['gui_app.py'],
              pathex=['.'],
              binaries=[],
              datas=[
                  ('.env.example', '.'),
                  ('main.py', '.'),
                  ('pdf_processor.py', '.'),
                  ('ai_client.py', '.'),
                  ('analyzer.py', '.'),
                  ('prompts.py', '.'),
              ],
              hiddenimports=[
                  'openai', 'fitz', 'pymupdf', 'tqdm', 'tenacity',
                  'pandas', 'openpyxl', 'dotenv', 'tkinter',
                  'tkinter.ttk', 'tkinter.filedialog', 'tkinter.messagebox',
                  'tkinter.scrolledtext', 'pkg_resources',
              ],
              hookspath=[],
              runtime_hooks=[],
              excludes=[],
              cipher=block_cipher,
          )
          pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)
          exe = EXE(pyz, a.scripts, [],
              exclude_binaries=True,
              name='幕布AI分析工具',
              debug=False, strip=False, upx=True,
              console=False,
              icon='AppIcon.icns')
          coll = COLLECT(exe, a.binaries, a.zipfiles, a.datas,
              strip=False, upx=True, name='幕布AI分析工具')
          app = BUNDLE(coll,
              name='幕布AI分析工具.app',
              icon='AppIcon.icns',
              bundle_identifier='com.mubu.ai.analyzer',
              info_plist={
                  'CFBundleShortVersionString': '${VERSION}',
                  'CFBundleVersion': '${VERSION}',
                  'NSHumanReadableCopyright': 'MIT License',
                  'LSMinimumSystemVersion': '11.0',
                  'NSHighResolutionCapable': True,
                  'CFBundleName': '幕布AI分析工具',
                  'CFBundleDisplayName': '幕布AI分析工具',
              })
          SPEC

      - name: 打包 .app
        run: |
          pyinstaller mubu_gui.spec --clean --noconfirm
          echo "打包完成："
          ls -lh dist/

      - name: 制作 DMG
        run: |
          brew install create-dmg
          VERSION="${{ github.event.inputs.version }}"
          DMG_NAME="幕布AI分析工具_v${VERSION}_macOS.dmg"

          create-dmg \
            --volname "幕布AI分析工具 v${VERSION}" \
            --volicon "AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 660 420 \
            --icon-size 120 \
            --icon "幕布AI分析工具.app" 180 200 \
            --hide-extension "幕布AI分析工具.app" \
            --app-drop-link 480 200 \
            "$DMG_NAME" \
            "dist/" || \
          hdiutil create \
            -volname "幕布AI分析工具 v${VERSION}" \
            -srcfolder "dist/" \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "DMG 制作完成："
          ls -lh *.dmg

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "幕布AI分析工具-v${{ github.event.inputs.version }}-DMG"
          path: "*.dmg"
          retention-days: 90

      - name: 创建 Git Tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}" 2>/dev/null || echo "Tag 已存在"
          git push origin "v${VERSION}" 2>/dev/null || echo "Tag 推送完成"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "幕布AI分析工具 v${{ github.event.inputs.version }}"
          body: |
            ## 幕布知识库 AI 批量分析工具 v${{ github.event.inputs.version }}

            ${{ github.event.inputs.release_notes }}

            ---

            ### 安装方法
            1. 下载下方的 `.dmg` 文件（约 100MB）
            2. 双击打开 DMG，将 **幕布AI分析工具** 拖入 **Applications（应用程序）** 文件夹
            3. 首次运行：在 Finder 中右键点击图标 → **打开**（绕过 Gatekeeper 安全提示）

            ### 首次使用
            1. 打开应用后，点击左侧「AI 配置」，填入您的 AI API Key
            2. 点击「PDF 文件」，将幕布导出的 PDF 放入分析目录
            3. 点击「开始分析」，选择模式运行
            4. 分析完成后在「查看结果」中查看报告

            ### 支持的 AI 模型
            | 模型 | 提供商 | 推荐指数 |
            |------|--------|----------|
            | deepseek-chat | DeepSeek | ⭐⭐⭐⭐⭐（性价比最高） |
            | moonshot-v1-128k | Kimi | ⭐⭐⭐⭐ |
            | qwen-long | 通义千问 | ⭐⭐⭐⭐ |
            | gpt-4o | OpenAI | ⭐⭐⭐ |
            | glm-4-long | 智谱 AI | ⭐⭐⭐ |

          files: "*.dmg"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
