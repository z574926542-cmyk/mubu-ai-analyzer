name: 手动触发发布 DMG

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: true
        default: '1.0.0'
      release_notes:
        description: '更新说明'
        required: false
        default: '幕布AI分析工具首次发布'

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: 生成应用图标
        run: |
          python3 - <<'EOF'
          from PIL import Image, ImageDraw
          import os, subprocess

          os.makedirs("AppIcon.iconset", exist_ok=True)
          sizes = [16, 32, 128, 256, 512]

          for size in sizes:
              img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              m = size // 8
              draw.rounded_rectangle([m, m, size-m, size-m], radius=size//5, fill=(41, 128, 185))
              # 绘制简单的"幕"字形状（用矩形代替）
              bar_h = size // 8
              bar_w = size * 3 // 4
              cx = size // 2
              for i, y_ratio in enumerate([0.3, 0.5, 0.7]):
                  y = int(size * y_ratio)
                  draw.rectangle([cx - bar_w//2, y - bar_h//2, cx + bar_w//2, y + bar_h//2], fill='white')
              img.save(f"AppIcon.iconset/icon_{size}x{size}.png")
              img.save(f"AppIcon.iconset/icon_{size//2 if size > 16 else 16}x{size//2 if size > 16 else 16}@2x.png")

          subprocess.run(["iconutil", "-c", "icns", "AppIcon.iconset", "-o", "AppIcon.icns"])
          print("图标生成完成")
          EOF

      - name: 创建启动脚本（用于 .app 包）
        run: |
          cat > app_launcher.py << 'LAUNCHER'
          #!/usr/bin/env python3
          """
          app_launcher.py
          Mac .app 包的图形化启动入口
          提供简单的终端交互界面
          """
          import os
          import sys
          import subprocess
          from pathlib import Path

          # 确定用户数据目录
          HOME = Path.home()
          DATA_DIR = HOME / ".mubu_analyzer"
          DATA_DIR.mkdir(exist_ok=True)
          (DATA_DIR / "input_pdfs").mkdir(exist_ok=True)
          (DATA_DIR / "output").mkdir(exist_ok=True)
          (DATA_DIR / "logs").mkdir(exist_ok=True)

          # 如果没有 .env 文件，从示例复制
          env_file = DATA_DIR / ".env"
          if not env_file.exists():
              # 获取 .app 包内的资源路径
              if getattr(sys, 'frozen', False):
                  bundle_dir = Path(sys._MEIPASS)
              else:
                  bundle_dir = Path(__file__).parent
              example = bundle_dir / ".env.example"
              if example.exists():
                  import shutil
                  shutil.copy(example, env_file)

          # 切换到数据目录运行
          os.chdir(DATA_DIR)

          # 设置环境变量让 main.py 能找到数据目录
          os.environ["PDF_INPUT_DIR"] = str(DATA_DIR / "input_pdfs")
          os.environ["OUTPUT_DIR"] = str(DATA_DIR / "output")

          # 加载 .env
          from dotenv import load_dotenv
          load_dotenv(env_file)

          print(f"""
          ╔══════════════════════════════════════════════════════════╗
          ║          幕布知识库 AI 批量分析工具                       ║
          ╚══════════════════════════════════════════════════════════╝

          数据目录：{DATA_DIR}
          PDF 目录：{DATA_DIR / 'input_pdfs'}
          输出目录：{DATA_DIR / 'output'}
          """)

          # 检查 API Key
          api_key = os.getenv("API_KEY", "")
          if not api_key or api_key == "你的API_Key填在这里":
              print(f"⚠️  请先配置 API Key！")
              print(f"   用文本编辑器打开：{env_file}")
              print(f"   填写 API_KEY=你的密钥")
              input("\n按 Enter 键退出...")
              sys.exit(0)

          # 运行主程序
          sys.argv = ["main.py"]
          exec(open(os.path.join(os.path.dirname(__file__) if not getattr(sys, 'frozen', False) else sys._MEIPASS, "main.py")).read())
          LAUNCHER

      - name: 创建 PyInstaller spec
        run: |
          cat > mubu_analyzer.spec << 'SPEC'
          # -*- mode: python ; coding: utf-8 -*-
          block_cipher = None
          a = Analysis(
              ['app_launcher.py'],
              pathex=['.'],
              binaries=[],
              datas=[
                  ('.env.example', '.'),
                  ('main.py', '.'),
                  ('pdf_processor.py', '.'),
                  ('ai_client.py', '.'),
                  ('analyzer.py', '.'),
                  ('prompts.py', '.'),
              ],
              hiddenimports=['openai','fitz','pymupdf','tqdm','tenacity','pandas','openpyxl','dotenv','pkg_resources'],
              hookspath=[],
              runtime_hooks=[],
              excludes=[],
              cipher=block_cipher,
          )
          pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)
          exe = EXE(pyz, a.scripts, [], exclude_binaries=True,
              name='幕布AI分析工具', debug=False, strip=False, upx=True, console=True)
          coll = COLLECT(exe, a.binaries, a.zipfiles, a.datas, strip=False, upx=True, name='幕布AI分析工具')
          app = BUNDLE(coll, name='幕布AI分析工具.app', icon='AppIcon.icns',
              bundle_identifier='com.mubu.ai.analyzer',
              info_plist={
                  'CFBundleShortVersionString': '${{ github.event.inputs.version }}',
                  'CFBundleVersion': '${{ github.event.inputs.version }}',
                  'NSHumanReadableCopyright': 'MIT License',
                  'LSMinimumSystemVersion': '11.0',
              })
          SPEC

      - name: 打包 .app
        run: |
          pyinstaller mubu_analyzer.spec --clean --noconfirm
          echo "打包完成，文件列表："
          ls -lh dist/

      - name: 安装 create-dmg 并制作 DMG
        run: |
          brew install create-dmg
          VERSION="${{ github.event.inputs.version }}"
          DMG_NAME="幕布AI分析工具_v${VERSION}_macOS.dmg"

          create-dmg \
            --volname "幕布AI分析工具 v${VERSION}" \
            --volicon "AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 660 420 \
            --icon-size 120 \
            --icon "幕布AI分析工具.app" 180 200 \
            --hide-extension "幕布AI分析工具.app" \
            --app-drop-link 480 200 \
            "$DMG_NAME" \
            "dist/" || \
          hdiutil create \
            -volname "幕布AI分析工具 v${VERSION}" \
            -srcfolder "dist/" \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "DMG 制作完成："
          ls -lh *.dmg

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "幕布AI分析工具-v${{ github.event.inputs.version }}-DMG"
          path: "*.dmg"
          retention-days: 90

      - name: 创建 Git Tag 并发布 Release
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}" || echo "Tag 已存在"
          git push origin "v${VERSION}" || echo "Tag 推送完成"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "幕布AI分析工具 v${{ github.event.inputs.version }}"
          body: |
            ## 幕布知识库 AI 批量分析工具 v${{ github.event.inputs.version }}

            ${{ github.event.inputs.release_notes }}

            ---

            ### 安装方法
            1. 下载下方的 `.dmg` 文件
            2. 双击打开，将 **幕布AI分析工具** 拖入 **Applications（应用程序）** 文件夹
            3. 首次运行时，右键点击 → 打开（绕过 Gatekeeper）

            ### 首次配置
            1. 运行后，程序会在 `~/.mubu_analyzer/` 目录自动生成 `.env` 配置文件
            2. 用文本编辑器打开该文件，填入你的 AI API Key
            3. 将幕布导出的 PDF 放入 `~/.mubu_analyzer/input_pdfs/` 目录
            4. 重新运行程序，选择分析模式

            ### 支持的 AI 模型
            | 模型 | 提供商 |
            |------|--------|
            | deepseek-chat | DeepSeek（推荐，性价比高） |
            | moonshot-v1-128k | Kimi（月之暗面） |
            | qwen-long | 通义千问（阿里云） |
            | gpt-4o | OpenAI（ChatGPT） |
            | glm-4-long | 智谱 AI |

          files: "*.dmg"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
